# mwcp parser_config.yml -- SOURCE OF TRUTH
#
# This file lives in mwcp_parsers/ alongside the parser .py files.
# Build-OfflineToolkit.ps1 -IncludeMWCP copies it over
# tools/mwcp/lib/mwcp/parser_config.yml AFTER pip install, so it is never
# overwritten by a fresh install.
#
# To add a new parser:
#   1. Write MyParser.py in mwcp_parsers/
#   2. Add the entry here (IR_Toolkit section)
#   3. Run Build-OfflineToolkit.ps1 -IncludeMWCP to stage everything
#
# Format: parsers reference the Python class with a leading dot (.ClassName).
# The class must be in a .py file of the same name as the YAML key.

# ---- DC3 built-in parsers (installed by pip, listed here for completeness) ---

Archive:
  description: Archive file types
  author: DC3
  parsers:
    - .Zip
    - .Gzip

Decoy:
  description: Generic file types described as a decoy file
  author: DC3
  parsers:
    - .DOC
    - .PDF
    - .RTF
    - .JPG
    - .DOCX
    - .XLSX
    - .PPTX

Executable:
  description: Generic parser using disassembly emulation
  author: DC3
  config:
    disassembler: ida
    depth: 0
    call_depth: 1
    exhaustive: false
    follow_loops: false
    max_instructions: 100_000
    min_length: 5
  parsers:
    - .PE
    - .ELF

foo:
  description: example parser that works on any file
  author: DC3
  parsers:
    - .Foo

GenericDropper:
  description: Generic Dropper
  author: DC3
  parsers:
    - .Overlay
    - .RSRC

ISO: .ImageFile
MachO: .FATBinary
PDF: .Document
PowerShell: .Script

Python:
  description: Python artifacts
  author: DC3
  parsers:
    - .PyInstaller

Quarantined:
  description: Anti-Virus Quarantined File
  author: DC3
  parsers:
    - .McAfee
    - .Defender
    - .SymantecQB
    - .SymantecSubSDK
    - .AhnLab
    - .Avast_AVG

RSA:
  description: RSA artifacts
  author: DC3
  parsers:
    - .DigitalCertificate
    - .PrivateKey
    - .PublicKey

VisualBasic:
  description: VisualBasic Script
  author: DC3
  parsers:
    - .EncodedASP
    - .VBE
    - .VBScript

# ---- IR Toolkit parsers -------------------------------------------------------
# Parsers live in category subfolders under mwcp_parsers/ (generic/,
# c2_frameworks/, stagers/, rats/, stealers/, ransomware/, ...). The
# "parsers:" value below is NOT the ".ClassName" shorthand (that shorthand
# resolves to a FLAT sibling module of this same top-level key, per mwcp's
# own registry._generate_parser_aux -- it does not support subfolders). Use
# the full dotted path instead: "<subfolder>.<ModuleName>.<ClassName>".

